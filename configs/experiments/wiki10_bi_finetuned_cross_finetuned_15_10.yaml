# Mirrors bi_finetuned_cross_finetuned_15_10.yaml: NO BM25 stage, both
# encoders fine-tuned for wiki10-31k -- bi-encoder scores the full label
# space directly, then cross-encoder reranks its top-15 candidates.
exp_id: wiki10_bi_finetuned_cross_finetuned_15_10
dataset: wiki10-31k
batch_size: 32
eval_ks: [1, 5, 10]
test_sample_size: null
pipeline:
  - stage: bi_encoder
    model_config: configs/models/bi_encoder_finetuned_wiki10.yaml
    top_k: 15
  - stage: cross_encoder
    model_config: configs/models/cross_encoder_finetuned_wiki10.yaml
    top_k: 10
