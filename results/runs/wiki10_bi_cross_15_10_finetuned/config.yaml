# Same shape as wiki10_bi_cross_15_10.yaml (no BM25 stage) but uses the
# fine-tuned bi-encoder instead of off-the-shelf. Cross-encoder is still
# off-the-shelf (not fine-tuned for Wiki10-31k yet).
exp_id: wiki10_bi_cross_15_10_finetuned
dataset: wiki10-31k
batch_size: 32
eval_ks: [1, 5, 10]
test_sample_size: null
pipeline:
  - stage: bi_encoder
    model_config: configs/models/bi_encoder_finetuned_wiki10.yaml
    top_k: 15
  - stage: cross_encoder
    top_k: 10
